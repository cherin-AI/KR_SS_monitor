name: Daily KIS Snapshot

on:
  workflow_dispatch:           # triggered by cron-job.org or manual run

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Set today date
        id: date
        run: echo "today=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore token cache
        uses: actions/cache@v4
        with:
          path: data/cache/token.json
          key: kis-token-${{ steps.date.outputs.today }}

      - name: Restore stock meta cache
        uses: actions/cache@v4
        with:
          path: data/cache/stock_meta.json
          key: kis-stock-meta-v1
          restore-keys: kis-stock-meta-v1

      - name: Validate secrets are set
        run: |
          if [ -z "$KIS_APP_KEY" ] || [ -z "$KIS_APP_SECRET" ]; then
            echo "ERROR: KIS_APP_KEY or KIS_APP_SECRET secret is missing or empty."
            echo "Go to Settings → Secrets and variables → Actions and set both secrets."
            exit 1
          fi
          echo "Secrets present (key length: ${#KIS_APP_KEY}, secret length: ${#KIS_APP_SECRET})"
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}

      - name: Check AI summary key (optional)
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "WARNING: ANTHROPIC_API_KEY not set — pipeline will use rules-based fallback summary."
            echo "To enable AI summaries, add ANTHROPIC_API_KEY to repository secrets."
          else
            echo "ANTHROPIC_API_KEY present (length: ${#ANTHROPIC_API_KEY})"
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Run daily pipeline
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ENV: prod
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/run_daily_pipeline.py --config config.example.yaml

      - name: Commit snapshot updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git commit -m "data: daily snapshot $(date -u +'%Y-%m-%d')"
          git pull --no-rebase -X ours origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
